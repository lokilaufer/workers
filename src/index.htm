<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workers | Новости кино</title>
</head>
<body>
<div class="container">
    <header>
        <h1>🎬 Workers | Новости мира кино</h1>
        <button id="refreshBtn" class="refresh-btn">
            🔄 Обновить
        </button>
    </header>

    <div class="news-container">
        <div class="loading-state" id="loadingState">
            <div class="loader"></div>
            <p>Загрузка новостей...</p>
        </div>

        <div class="error-state" id="errorState" style="display: none;">
            <div class="error-icon">⚠️</div>
            <h3>Не удалось загрузить данные</h3>
            <p>Проверьте подключение и обновите страницу</p>
            <button id="retryBtn" class="retry-btn">🔄 Попробовать снова</button>
        </div>

        <div class="news-list" id="newsList" style="display: none;">
            <!-- Новости будут здесь -->
        </div>
    </div>
</div>
</body>
</html>
