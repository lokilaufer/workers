<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workers - Нет подключения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .offline-container {
            background: white;
            border-radius: 28px;
            padding: 48px 32px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .offline-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            color: #2d3748;
            margin-bottom: 12px;
        }
        p {
            color: #718096;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .retry-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .retry-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="offline-container">
    <div class="offline-icon">🌐</div>
    <h1>Нет подключения к интернету</h1>
    <p>Проверьте ваше интернет-соединение<br>и попробуйте снова</p>
    <button class="retry-btn" onclick="location.reload()">
        🔄 Попробовать снова
    </button>
</div>
</body>
</html>
